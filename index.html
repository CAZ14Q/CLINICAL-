<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLINICAL Ultimate - Fixed Features</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #020617;
            --card-dark: #0f172a;
            --border-dark: #1e293b;
            --text-main: #f1f5f9;
            --accent-blue: #3b82f6;
            --accent-green: #10b981;
            --accent-purple: #a855f7;
            --accent-amber: #f59e0b;
            --accent-red: #ef4444;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: 'Cairo', sans-serif; 
            background-color: var(--bg-dark); 
            color: var(--text-main);
            margin: 0; display: flex; height: 100vh; overflow: hidden;
        }

        /* Sidebar */
        #sidebar {
            background-color: var(--bg-dark);
            border-left: 1px solid var(--border-dark);
            height: 100%;
            display: flex; flex-direction: column;
            transition: width 0.3s ease;
            z-index: 1000;
        }
        .sidebar-expanded { width: 260px; }
        .sidebar-collapsed { width: 80px; }

        .sidebar-header {
            padding: 24px; border-bottom: 1px solid var(--border-dark);
            display: flex; align-items: center; justify-content: space-between;
        }
        .logo-box {
            background: var(--accent-blue); min-width: 36px; height: 36px; border-radius: 8px;
            display: flex; align-items: center; justify-content: center; font-weight: 900; color: white;
        }
        .logo-text { font-weight: 900; font-size: 1.2rem; margin-right: 12px; white-space: nowrap; }
        .sidebar-collapsed .logo-text, .sidebar-collapsed .nav-text { display: none; }

        .nav-list { flex: 1; padding: 16px; overflow-y: auto; }
        .nav-item {
            display: flex; align-items: center; padding: 12px; margin-bottom: 6px;
            border-radius: 12px; cursor: pointer; transition: 0.2s;
            color: #94a3b8; width: 100%; border: none; background: none; font-family: inherit;
            text-align: right;
        }
        .nav-item:hover { background: rgba(255, 255, 255, 0.05); }
        .nav-item.active { background: var(--accent-blue); color: white; font-weight: bold; }
        .nav-icon { font-size: 1.2rem; min-width: 30px; text-align: center; }
        .nav-text { margin-right: 12px; white-space: nowrap; }

        /* Instagram Button */
        .instagram-link {
            background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
            color: white; text-decoration: none; padding: 15px; text-align: center;
            font-weight: bold; font-size: 0.9rem; transition: 0.3s;
        }
        .instagram-link:hover { opacity: 0.9; }

        /* Content Wrapper */
        #main-wrapper { flex: 1; display: flex; flex-direction: column; min-width: 0; position: relative; }
        header { 
            height: 64px; border-bottom: 1px solid var(--border-dark); 
            display: flex; align-items: center; padding: 0 24px;
            background: rgba(2, 6, 23, 0.8); backdrop-filter: blur(10px);
            justify-content: space-between;
        }
        main { flex: 1; padding: 24px; overflow-y: auto; }

        /* UI Elements */
        .card { background: var(--card-dark); border: 1px solid var(--border-dark); border-radius: 16px; padding: 20px; margin-bottom: 15px; }
        .primary-btn { 
            background: var(--accent-blue); color: white; border: none; 
            padding: 10px 20px; border-radius: 10px; font-weight: bold; cursor: pointer;
        }
        input, select, textarea { 
            width: 100%; padding: 12px; background: #1e293b; border: 1px solid #334155; 
            color: white; border-radius: 10px; margin-bottom: 10px; font-family: inherit;
        }

        /* Modals */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(5px);
            display: none; align-items: center; justify-content: center; z-index: 2000; padding: 16px;
        }
        .modal-box { background: var(--card-dark); border: 1px solid var(--border-dark); width: 100%; max-width: 450px; border-radius: 20px; padding: 24px; }

        /* History Panel */
        #history-panel {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-dark); z-index: 1500; display: none;
            flex-direction: column; overflow-y: auto; animation: slideLeft 0.3s ease;
        }
        @keyframes slideLeft { from { transform: translateX(-100%); } to { transform: translateX(0); } }

        table { width: 100%; border-collapse: collapse; text-align: right; }
        th { padding: 12px; color: #64748b; font-size: 0.8rem; border-bottom: 1px solid var(--border-dark); }
        td { padding: 12px; border-bottom: 1px solid var(--border-dark); }
        
        .delete-btn { color: var(--accent-red); background: none; border: none; cursor: pointer; }
    </style>
</head>
<body>

    <aside id="sidebar" class="sidebar-expanded">
        <div class="sidebar-header">
            <div style="display: flex; align-items: center;">
                <div class="logo-box">CL</div>
                <span class="logo-text">CLINICAL</span>
            </div>
            <button class="primary-btn" onclick="toggleSidebar()" style="padding: 5px; background: none;">⇄</button>
        </div>
        
        <nav class="nav-list" id="sidebar-nav">
            <!-- Dynamic Navigation -->
        </nav>

        <button class="primary-btn" style="margin: 16px; background: var(--accent-purple);" onclick="openModal('m-sections')">تعديل الأقسام ⚙️</button>
        <a href="https://instagram.com/gencazai" target="_blank" class="instagram-link">Instagram: @gencazai</a>
    </aside>

    <div id="main-wrapper">
        <header>
            <h2 id="header-title">لوحة التحكم</h2>
            <div id="header-actions"></div>
        </header>

        <main id="main-content">
            <!-- Dynamic Content -->
        </main>

        <!-- Patient History Panel -->
        <div id="history-panel">
            <header style="background: var(--card-dark); border-bottom: 1px solid var(--border-dark);">
                <div style="display:flex; align-items:center;">
                    <button class="primary-btn" onclick="closeHistory()" style="margin-left:15px; background:#475569">إغلاق</button>
                    <div><h3 id="hist-p-name" style="margin:0"></h3><small id="hist-p-meta"></small></div>
                </div>
                <button class="primary-btn" style="background: var(--accent-green)" onclick="savePatientHistory()">حفظ الملف الطبي ✓</button>
            </header>
            <div style="padding:20px; display:grid; grid-template-columns:1fr 1fr; gap:20px;">
                <div>
                    <div class="card"><h4>الشكوى (CC)</h4><textarea id="h-cc" rows="2"></textarea></div>
                    <div class="card"><h4>تفاصيل المرض (HPI)</h4><textarea id="h-hpi" rows="6"></textarea></div>
                    <div class="card"><h4>التاريخ الطبي السابق</h4><input id="h-pmh" placeholder="أمراض، عمليات..."></div>
                </div>
                <div>
                    <div class="card">
                        <h4>العلامات الحيوية</h4>
                        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                            <input id="v-bp" placeholder="الضغط">
                            <input id="v-hr" placeholder="النبض">
                            <input id="v-temp" placeholder="الحرارة">
                            <input id="v-spo2" placeholder="الأكسجين">
                        </div>
                    </div>
                    <div class="card"><h4>التشخيص والخطة</h4><textarea id="h-plan" rows="6"></textarea></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modals -->
    <div id="m-sections" class="modal-overlay">
        <div class="modal-box">
            <h3>إضافة قسم جديد</h3>
            <input id="new-sec-name" placeholder="اسم القسم">
            <input id="new-sec-icon" placeholder="الأيقونة">
            <button class="primary-btn" style="width:100%" onclick="addSection()">إضافة</button>
            <div id="sec-manage-list" style="margin-top:20px; border-top:1px solid #1e293b; padding-top:10px;"></div>
            <button class="primary-btn" style="width:100%; background:#475569; margin-top:10px" onclick="closeModal('m-sections')">إغلاق</button>
        </div>
    </div>

    <div id="m-add-generic" class="modal-overlay">
        <div class="modal-box">
            <h3 id="generic-title">إضافة سجل</h3>
            <input id="gen-title" placeholder="العنوان / اسم الدواء / نوع الفحص">
            <textarea id="gen-desc" placeholder="التفاصيل / السعر / النتائج" rows="4"></textarea>
            <button class="primary-btn" style="width:100%" onclick="saveGenericData()">حفظ</button>
            <button class="primary-btn" style="width:100%; background:#475569; margin-top:10px" onclick="closeModal('m-add-generic')">إلغاء</button>
        </div>
    </div>

    <div id="m-patient" class="modal-overlay">
        <div class="modal-box">
            <h3>تسجيل مريض</h3>
            <input id="p-name" placeholder="الاسم">
            <input id="p-age" type="number" placeholder="العمر">
            <select id="p-gender"><option>ذكر</option><option>أنثى</option></select>
            <button class="primary-btn" style="width:100%" onclick="addPatient()">تأكيد</button>
            <button class="primary-btn" style="width:100%; background:#475569; margin-top:10px" onclick="closeModal('m-patient')">إلغاء</button>
        </div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('clin_fixed_db')) || {
            sections: [
                { id: 'dash', name: 'لوحة التحكم', icon: '📊', type: 'dash', canDel: false },
                { id: 'patients', name: 'المرضى', icon: '👥', type: 'patients', canDel: false },
                { id: 'rx', name: 'الصيدلية', icon: '💊', type: 'generic', canDel: true },
                { id: 'lab', name: 'المختبر', icon: '🧪', type: 'generic', canDel: true },
                { id: 'bills', name: 'الفواتير', icon: '🧾', type: 'generic', canDel: true }
            ],
            patients: [],
            genericData: { rx: [], lab: [], bills: [] }
        };

        let currentView = 'dash';
        let activePatientId = null;

        function save() {
            localStorage.setItem('clin_fixed_db', JSON.stringify(db));
            render();
        }

        function toggleSidebar() {
            const s = document.getElementById('sidebar');
            s.classList.toggle('sidebar-expanded');
            s.classList.toggle('sidebar-collapsed');
        }

        function render() {
            // Sidebar
            const nav = document.getElementById('sidebar-nav');
            nav.innerHTML = db.sections.map(s => `
                <button class="nav-item ${currentView === s.id ? 'active' : ''}" onclick="setView('${s.id}')">
                    <span class="nav-icon">${s.icon}</span><span class="nav-text">${s.name}</span>
                </button>
            `).join('');

            // Section Manager
            document.getElementById('sec-manage-list').innerHTML = db.sections.filter(s=>s.canDel).map(s=>`
                <div style="display:flex; justify-content:space-between; padding:5px">
                    <span>${s.icon} ${s.name}</span>
                    <button class="delete-btn" onclick="deleteSection('${s.id}')">حذف</button>
                </div>
            `).join('');

            // Content
            const main = document.getElementById('main-content');
            const actions = document.getElementById('header-actions');
            const sec = db.sections.find(s => s.id === currentView);
            document.getElementById('header-title').innerText = sec.name;

            if (currentView === 'dash') {
                actions.innerHTML = '';
                main.innerHTML = `
                    <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap:15px">
                        <div class="card"><h4>المرضى</h4><h2>${db.patients.length}</h2></div>
                        <div class="card"><h4>أدوية الصيدلية</h4><h2>${(db.genericData.rx||[]).length}</h2></div>
                        <div class="card"><h4>الفحوصات</h4><h2>${(db.genericData.lab||[]).length}</h2></div>
                        <div class="card"><h4>الفواتير</h4><h2>${(db.genericData.bills||[]).length}</h2></div>
                    </div>
                `;
            } else if (currentView === 'patients') {
                actions.innerHTML = `<button class="primary-btn" onclick="openModal('m-patient')">مريض جديد +</button>`;
                main.innerHTML = `
                    <div class="card">
                        <table>
                            <thead><tr><th>الاسم</th><th>العمر</th><th>الجنس</th><th>إجراء</th></tr></thead>
                            <tbody>${db.patients.map(p => `
                                <tr>
                                    <td><b>${p.name}</b></td>
                                    <td>${p.age}</td>
                                    <td>${p.gender}</td>
                                    <td><button class="primary-btn" style="padding:5px 10px; font-size:11px" onclick="openHistory('${p.id}')">الملف الطبي 📋</button></td>
                                </tr>
                            `).join('')}</tbody>
                        </table>
                    </div>
                `;
            } else {
                actions.innerHTML = `<button class="primary-btn" onclick="openGenericModal('${currentView}')">إضافة سجل +</button>`;
                const items = db.genericData[currentView] || [];
                main.innerHTML = `<div style="display:grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap:15px">
                    ${items.map(i => `
                        <div class="card">
                            <div style="display:flex; justify-content:space-between">
                                <b>${i.title}</b>
                                <button class="delete-btn" onclick="deleteGenericItem('${currentView}', ${i.id})">✕</button>
                            </div>
                            <p style="color:#94a3b8; font-size:0.9rem">${i.desc}</p>
                            <small style="color:#475569">${i.date}</small>
                        </div>
                    `).join('')}
                </div>`;
            }
        }

        // Functions
        function setView(id) { currentView = id; render(); }
        
        function addSection() {
            const name = document.getElementById('new-sec-name').value;
            const icon = document.getElementById('new-sec-icon').value || '📁';
            if(!name) return;
            const id = 'sec_' + Date.now();
            db.sections.push({ id, name, icon, type: 'generic', canDel: true });
            db.genericData[id] = [];
            document.getElementById('new-sec-name').value = '';
            save();
        }

        function deleteSection(id) {
            db.sections = db.sections.filter(s => s.id !== id);
            delete db.genericData[id];
            if(currentView === id) currentView = 'dash';
            save();
        }

        function addPatient() {
            const name = document.getElementById('p-name').value;
            if(!name) return;
            db.patients.push({ id: 'p'+Date.now(), name, age: document.getElementById('p-age').value, gender: document.getElementById('p-gender').value, history: {} });
            closeModal('m-patient');
            save();
        }

        function openGenericModal(id) {
            document.getElementById('generic-title').innerText = "إضافة إلى " + db.sections.find(s=>s.id===id).name;
            openModal('m-add-generic');
        }

        function saveGenericData() {
            const title = document.getElementById('gen-title').value;
            const desc = document.getElementById('gen-desc').value;
            if(!title) return;
            if(!db.genericData[currentView]) db.genericData[currentView] = [];
            db.genericData[currentView].push({ id: Date.now(), title, desc, date: new Date().toLocaleDateString('ar-EG') });
            document.getElementById('gen-title').value = '';
            document.getElementById('gen-desc').value = '';
            closeModal('m-add-generic');
            save();
        }

        function deleteGenericItem(vid, itemId) {
            db.genericData[vid] = db.genericData[vid].filter(i => i.id !== itemId);
            save();
        }

        // History
        function openHistory(id) {
            activePatientId = id;
            const p = db.patients.find(x => x.id === id);
            document.getElementById('hist-p-name').innerText = p.name;
            document.getElementById('hist-p-meta').innerText = `${p.age} سنة | ${p.gender}`;
            const h = p.history || {};
            document.getElementById('h-cc').value = h.cc || '';
            document.getElementById('h-hpi').value = h.hpi || '';
            document.getElementById('h-pmh').value = h.pmh || '';
            document.getElementById('v-bp').value = h.bp || '';
            document.getElementById('v-hr').value = h.hr || '';
            document.getElementById('v-temp').value = h.temp || '';
            document.getElementById('v-spo2').value = h.spo2 || '';
            document.getElementById('h-plan').value = h.plan || '';
            document.getElementById('history-panel').style.display = 'flex';
        }

        function savePatientHistory() {
            const p = db.patients.find(x => x.id === activePatientId);
            p.history = {
                cc: document.getElementById('h-cc').value,
                hpi: document.getElementById('h-hpi').value,
                pmh: document.getElementById('h-pmh').value,
                bp: document.getElementById('v-bp').value,
                hr: document.getElementById('v-hr').value,
                temp: document.getElementById('v-temp').value,
                spo2: document.getElementById('v-spo2').value,
                plan: document.getElementById('h-plan').value
            };
            save();
            closeHistory();
        }

        function closeHistory() { document.getElementById('history-panel').style.display = 'none'; }
        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        render();
    </script>
</body>
</html>

```
