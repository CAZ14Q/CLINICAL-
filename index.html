<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClinicaPRO AI v2 | نظام إدارة العيادة الذكي</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Tajawal', sans-serif; overflow: hidden; }
        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-in { animation: fadeIn 0.4s ease-out forwards; }
    </style>

    <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js",
        "lucide-react": "https://esm.sh/lucide-react@0.284.0"
      }
    }
    </script>
</head>
<body class="bg-[#070912] text-slate-300">

    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import { initializeApp } from 'firebase/app';
        import { getAuth, signInAnonymously, onAuthStateChanged, signOut } from 'firebase/auth';
        import { 
          getFirestore, collection, addDoc, onSnapshot, doc, 
          updateDoc, deleteDoc, serverTimestamp 
        } from 'firebase/firestore';
        import { 
          Users, Plus, Search, Phone, Calendar, 
          Edit3, X, Clock, LayoutDashboard, 
          ChevronLeft, Activity, Database,
          Trash2, LogOut, Stethoscope, TrendingUp, 
          ShieldAlert, ChevronRight, MoreVertical, Printer
        } from 'lucide-react';

        const { useState, useEffect } = React;

        // --- Firebase Config (ضع بياناتك هنا) ---
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'clinica-pro-ai-v2';

        function App() {
            const [user, setUser] = useState(null);
            const [patients, setPatients] = useState([]);
            const [search, setSearch] = useState('');
            const [activeTab, setActiveTab] = useState('dashboard');
            const [selectedPatient, setSelectedPatient] = useState(null);
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [loading, setLoading] = useState(false);

            const initialPatientState = {
                name: '', phone: '', age: '', gender: 'Male', status: 'Stable',
                vitals: { bp: '', hr: '', temp: '', spo2: '' },
                diagnosis: { primary: '', secondary: '', icdCode: '' }
            };
            const [formData, setFormData] = useState(initialPatientState);

            useEffect(() => {
                const unsubAuth = onAuthStateChanged(auth, (currUser) => {
                    if (currUser) setUser(currUser);
                    else signInAnonymously(auth);
                });
                return unsubAuth;
            }, []);

            useEffect(() => {
                if (!user) return;
                const pRef = collection(db, 'artifacts', appId, 'users', user.uid, 'patients');
                return onSnapshot(pRef, (snap) => {
                    setPatients(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                });
            }, [user]);

            const handleSave = async (e) => {
                e.preventDefault();
                setLoading(true);
                try {
                    const pRef = collection(db, 'artifacts', appId, 'users', user.uid, 'patients');
                    const data = { ...formData, updatedAt: serverTimestamp(), aiInsights: { riskScore: formData.status === 'Critical' ? 85 : 15 } };
                    if (formData.id) await updateDoc(doc(pRef, formData.id), data);
                    else await addDoc(pRef, { ...data, createdAt: serverTimestamp() });
                    setIsModalOpen(false);
                    setFormData(initialPatientState);
                } catch (err) { console.error(err); } finally { setLoading(false); }
            };

            if (!user) return <div className="h-screen flex items-center justify-center text-blue-500 font-bold animate-pulse text-xl">Initializing Secure Core...</div>;

            return (
                <div className="min-h-screen flex rtl" dir="rtl">
                    {/* Sidebar */}
                    <aside className="w-72 bg-[#0d111d] border-l border-white/5 flex flex-col shrink-0">
                        <div className="p-8 flex-1">
                            <div className="flex items-center gap-3 mb-12">
                                <div className="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg shadow-blue-600/30">
                                   <Activity size={24} className="text-white"/>
                                </div>
                                <h1 className="font-black text-lg text-white">Clinica<span className="text-blue-500">PRO</span></h1>
                            </div>
                            <nav className="space-y-2">
                                <button onClick={() => setActiveTab('dashboard')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-2xl transition ${activeTab === 'dashboard' ? 'bg-blue-600 text-white shadow-xl' : 'hover:bg-white/5'}`}>
                                    <LayoutDashboard size={18}/> <span className="font-bold">لوحة التحكم</span>
                                </button>
                                <button onClick={() => setActiveTab('records')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-2xl transition ${activeTab === 'records' ? 'bg-blue-600 text-white shadow-xl' : 'hover:bg-white/5'}`}>
                                    <Users size={18}/> <span className="font-bold">السجلات الطبية</span>
                                </button>
                            </nav>
                        </div>
                        <div className="p-6 border-t border-white/5"><button onClick={() => signOut(auth)} className="flex items-center gap-3 text-slate-500 hover:text-red-500 w-full px-4 font-bold"><LogOut size={16}/> خروج</button></div>
                    </aside>

                    {/* Main Workspace */}
                    <main className="flex-1 flex flex-col h-screen overflow-hidden">
                        <header className="h-20 bg-[#070912] border-b border-white/5 px-8 flex items-center justify-between shrink-0">
                           <h2 className="text-white font-black text-xl">{activeTab === 'dashboard' ? 'الرئيسية' : 'قاعدة البيانات'}</h2>
                           <div className="flex items-center gap-4">
                              <div className="relative group">
                                <Search className="absolute right-4 top-1/2 -translate-y-1/2 text-slate-500" size={16}/>
                                <input type="text" placeholder="بحث ذكي..." className="bg-white/5 border border-white/10 rounded-2xl py-2 px-10 text-sm outline-none focus:border-blue-500 w-64 transition-all" value={search} onChange={e => setSearch(e.target.value)} />
                              </div>
                              <button onClick={() => {setFormData(initialPatientState); setIsModalOpen(true);}} className="bg-blue-600 hover:bg-blue-500 text-white px-6 py-2 rounded-2xl font-black text-sm flex items-center gap-2 shadow-lg shadow-blue-600/20">
                                <Plus size={18}/> مريض جديد
                              </button>
                           </div>
                        </header>

                        <div className="flex-1 overflow-y-auto p-8 custom-scroll">
                            {activeTab === 'dashboard' && (
                                <div className="grid grid-cols-1 md:grid-cols-4 gap-6 animate-in">
                                    <div className="bg-[#0d111d] p-6 rounded-[2rem] border border-white/5">
                                        <p className="text-[10px] font-black text-slate-500 uppercase mb-2">إجمالي المرضى</p>
                                        <div className="text-4xl font-black text-blue-500">{patients.length}</div>
                                    </div>
                                    <div className="bg-[#0d111d] p-6 rounded-[2rem] border border-white/5">
                                        <p className="text-[10px] font-black text-slate-500 uppercase mb-2">حالات حرجة</p>
                                        <div className="text-4xl font-black text-red-500">{patients.filter(p => p.status === 'Critical').length}</div>
                                    </div>
                                </div>
                            )}

                            {activeTab === 'records' && (
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-6 animate-in">
                                    {patients.filter(p => p.name.includes(search)).map(p => (
                                        <div key={p.id} className="bg-[#0d111d] p-6 rounded-[2.5rem] border border-white/5 hover:border-blue-500/30 transition-all relative group overflow-hidden">
                                            <div className="flex gap-4 mb-6">
                                                <div className="w-14 h-14 bg-blue-600 rounded-2xl flex items-center justify-center text-white font-black text-2xl">{p.name[0]}</div>
                                                <div>
                                                    <h4 className="text-white font-bold text-lg leading-tight">{p.name}</h4>
                                                    <span className={`text-[10px] font-black px-2 py-0.5 rounded-full border ${p.status === 'Critical' ? 'text-red-500 border-red-500/20' : 'text-green-500 border-green-500/20'}`}>{p.status}</span>
                                                </div>
                                            </div>
                                            <div className="bg-white/5 p-4 rounded-xl mb-4 text-xs">
                                                <p className="text-slate-500 mb-1">التشخيص:</p>
                                                <p className="text-white font-medium truncate">{p.diagnosis?.primary || 'لا يوجد'}</p>
                                            </div>
                                            <div className="flex gap-2">
                                                <button onClick={() => {setFormData(p); setIsModalOpen(true);}} className="flex-1 bg-white/5 py-2 rounded-xl hover:text-blue-500"><Edit3 size={16} className="mx-auto"/></button>
                                                <button onClick={async () => await deleteDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'patients', p.id))} className="flex-1 bg-white/5 py-2 rounded-xl hover:text-red-500"><Trash2 size={16} className="mx-auto"/></button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    </main>

                    {/* Modal */}
                    {isModalOpen && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/80 backdrop-blur-sm p-4 animate-in">
                            <div className="bg-[#0d111d] w-full max-w-2xl rounded-[3rem] p-10 border border-white/10 relative">
                                <button onClick={() => setIsModalOpen(false)} className="absolute top-8 left-8 text-slate-500 hover:text-white"><X/></button>
                                <h3 className="text-2xl font-black text-white mb-8">إضافة / تعديل سجل مريض</h3>
                                <form onSubmit={handleSave} className="space-y-6">
                                    <input placeholder="الاسم الكامل" required className="w-full bg-white/5 border border-white/10 rounded-2xl p-4 text-sm text-white outline-none focus:border-blue-500" value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} />
                                    <div className="grid grid-cols-2 gap-4">
                                        <input placeholder="رقم الجوال" className="bg-white/5 border border-white/10 rounded-2xl p-4 text-sm text-white outline-none" value={formData.phone} onChange={e => setFormData({...formData, phone: e.target.value})} />
                                        <select className="bg-white/5 border border-white/10 rounded-2xl p-4 text-sm text-white outline-none" value={formData.status} onChange={e => setFormData({...formData, status: e.target.value})}>
                                            <option value="Stable">مستقر</option>
                                            <option value="Critical">حرج</option>
                                        </select>
                                    </div>
                                    <textarea placeholder="التشخيص الرئيسي" className="w-full bg-white/5 border border-white/10 rounded-2xl p-4 text-sm text-white outline-none focus:border-blue-500" value={formData.diagnosis.primary} onChange={e => setFormData({...formData, diagnosis: {...formData.diagnosis, primary: e.target.value}})} />
                                    <button type="submit" disabled={loading} className="w-full bg-blue-600 py-4 rounded-[2rem] text-white font-black text-lg shadow-2xl hover:bg-blue-500 transition-all">
                                        {loading ? 'جاري الحفظ...' : 'حفظ السجل الطبي'}
                                    </button>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
