<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClinicaPRO | نظام إدارة العيادة</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap');
        body { font-family: 'Tajawal', sans-serif; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-[#070912] text-slate-300">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- واجهة التطبيق الرئيسية ---
        function App() {
            const [activeTab, setActiveTab] = useState('dashboard');
            const [search, setSearch] = useState('');
            const [isModalOpen, setIsModalOpen] = useState(false);
            
            // بيانات تجريبية (لأننا في ملف HTML واحد بدون سيرفر حالياً)
            const [patients, setPatients] = useState([
                { id: 1, name: "أحمد محمد", phone: "0501234567", status: "Active", condition: "مراجعة دورية", age: 35 },
                { id: 2, name: "سارة خالد", phone: "0559876543", status: "Critical", condition: "ارتفاع ضغط الدم", age: 29 }
            ]);

            const filteredPatients = patients.filter(p => p.name.includes(search));

            return (
                <div class="min-h-screen flex transition-all duration-500">
                    
                    {/* Sidebar */}
                    <aside class="w-64 bg-[#0d111d] border-l border-white/5 flex flex-col hidden md:flex">
                        <div class="p-8 flex-1">
                            <div class="flex items-center gap-3 mb-12">
                                <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg shadow-blue-600/20">
                                    <i data-lucide="activity" class="text-white"></i>
                                </div>
                                <h1 class="font-black text-xl text-white tracking-tight">Clinica<span class="text-blue-600">PRO</span></h1>
                            </div>
                            
                            <nav class="space-y-2">
                                <NavItem active={activeTab === 'dashboard'} onClick={() => setActiveTab('dashboard')} icon="layout-dashboard" label="الرئيسية" />
                                <NavItem active={activeTab === 'records'} onClick={() => setActiveTab('records')} icon="users" label="المرضى" />
                                <NavItem active={activeTab === 'appts'} onClick={() => setActiveTab('appts')} icon="calendar" label="المواعيد" />
                            </nav>
                        </div>
                        <div class="p-6 border-t border-white/5">
                            <button class="flex items-center gap-3 text-slate-500 hover:text-red-500 transition w-full px-4">
                                <i data-lucide="log-out" class="w-4"></i> خروج
                            </button>
                        </div>
                    </aside>

                    {/* Main Content */}
                    <main class="flex-1 flex flex-col h-screen overflow-hidden">
                        <header class="h-20 bg-[#070912]/80 backdrop-blur-md border-b border-white/5 px-8 flex items-center justify-between z-10">
                            <h2 class="text-white font-bold text-lg">
                                {activeTab === 'dashboard' ? 'لوحة التحكم' : activeTab === 'records' ? 'سجل المرضى' : 'المواعيد'}
                            </h2>
                            <div class="flex items-center gap-4">
                                <div class="relative hidden sm:block">
                                    <i data-lucide="search" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-500 w-4"></i>
                                    <input 
                                        type="text" 
                                        placeholder="بحث عن مريض..." 
                                        class="bg-white/5 border border-white/10 rounded-xl py-2 pr-10 pl-4 text-xs outline-none focus:border-blue-500 w-64 transition-all"
                                        value={search}
                                        onChange={(e) => setSearch(e.target.value)}
                                    />
                                </div>
                                <button onClick={() => setIsModalOpen(true)} class="bg-blue-600 hover:bg-blue-500 text-white px-5 py-2.5 rounded-xl font-bold text-xs flex items-center gap-2 shadow-lg shadow-blue-600/30 transition-transform active:scale-95">
                                    <i data-lucide="plus" class="w-4"></i> مريض جديد
                                </button>
                            </div>
                        </header>

                        <div class="flex-1 overflow-y-auto p-8 custom-scroll">
                            {activeTab === 'dashboard' && (
                                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 animate-fade-in">
                                    <StatCard label="إجمالي المرضى" value={patients.length} color="blue" />
                                    <StatCard label="حالات نشطة" value="12" color="green" />
                                    <StatCard label="مواعيد اليوم" value="5" color="orange" />
                                </div>
                            )}

                            {activeTab === 'records' && (
                                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 animate-fade-in">
                                    {filteredPatients.map(p => (
                                        <PatientCard key={p.id} patient={p} />
                                    ))}
                                </div>
                            )}
                        </div>
                    </main>

                    {/* Modal */}
                    {isModalOpen && (
                        <div class="fixed inset-0 z-50 flex items-center justify-center bg-black/90 backdrop-blur-sm p-4 animate-fade-in">
                            <div class="bg-[#0d111d] w-full max-w-md rounded-[2.5rem] p-10 border border-white/10 relative shadow-2xl">
                                <button onClick={() => setIsModalOpen(false)} class="absolute top-8 left-8 text-slate-500 hover:text-white transition">
                                    <i data-lucide="x"></i>
                                </button>
                                <h3 class="text-2xl font-black text-white mb-8">تسجيل مريض</h3>
                                <div class="space-y-4">
                                    <input placeholder="الاسم الكامل" class="w-full bg-white/5 border border-white/10 rounded-2xl p-4 text-sm outline-none focus:border-blue-500 text-white" />
                                    <input placeholder="رقم الجوال" class="w-full bg-white/5 border border-white/10 rounded-2xl p-4 text-sm outline-none focus:border-blue-500 text-white" />
                                    <button class="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-2xl text-white font-black mt-4 shadow-lg shadow-blue-600/20 transition-all">حفظ البيانات</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // --- المكونات الفرعية (Sub-components) ---

        function NavItem({ active, onClick, icon, label }) {
            return (
                <button onClick={onClick} class={`w-full flex items-center gap-4 px-5 py-3.5 rounded-2xl transition-all duration-300 ${active ? 'bg-blue-600 text-white shadow-xl shadow-blue-600/20 translate-x-1' : 'hover:bg-white/5 text-slate-400'}`}>
                    <i data-lucide={icon} class="w-5"></i>
                    <span class="text-sm font-bold">{label}</span>
                </button>
            );
        }

        function StatCard({ label, value, color }) {
            const colors = {
                blue: 'text-blue-500',
                green: 'text-emerald-500',
                orange: 'text-orange-500'
            };
            return (
                <div class="bg-[#0d111d] p-8 rounded-[2rem] border border-white/5 hover:border-white/10 transition-all">
                    <p class="text-[11px] font-black text-slate-500 uppercase tracking-widest mb-3">{label}</p>
                    <div class={`text-4xl font-black ${colors[color]}`}>{value}</div>
                </div>
            );
        }

        function PatientCard({ patient }) {
            return (
                <div class="bg-[#0d111d] p-6 rounded-[2rem] border border-white/5 group hover:border-blue-500/30 transition-all duration-500">
                    <div class="flex justify-between items-start mb-6">
                        <div class="w-14 h-14 bg-gradient-to-br from-blue-600/20 to-blue-600/5 rounded-2xl flex items-center justify-center text-blue-500 font-black text-xl border border-blue-600/10">
                            {patient.name[0]}
                        </div>
                        <span class={`text-[10px] font-black px-3 py-1.5 rounded-xl ${patient.status === 'Critical' ? 'bg-red-500/10 text-red-500' : 'bg-emerald-500/10 text-emerald-500'}`}>
                            {patient.status === 'Critical' ? 'حالة حرجة' : 'مستقر'}
                        </span>
                    </div>
                    <h4 class="text-white font-bold text-lg mb-1 group-hover:text-blue-400 transition-colors">{patient.name}</h4>
                    <p class="text-xs text-slate-500 mb-4">{patient.phone}</p>
                    <div class="pt-4 border-t border-white/5 flex items-center justify-between">
                        <div class="flex items-center gap-2 text-slate-400 text-[10px]">
                            <i data-lucide="clock" class="w-3"></i> {patient.age} سنة
                        </div>
                        <button class="text-slate-500 hover:text-white transition">
                            <i data-lucide="more-horizontal" class="w-5"></i>
                        </button>
                    </div>
                </div>
            );
        }

        // تشغيل React وتفعيل الأيقونات
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        
        // تحديث الأيقونات بعد التحميل
        setTimeout(() => lucide.createIcons(), 100);
    </script>
</body>
</html>
