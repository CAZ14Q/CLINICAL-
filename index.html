<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClinicaPRO</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
body { font-family: sans-serif; background:#070912; color:#fff; }
</style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;

function App(){

const [patients,setPatients]=useState(()=>JSON.parse(localStorage.getItem('data'))||[]);
const [search,setSearch]=useState('');
const [open,setOpen]=useState(false);

const [form,setForm]=useState({
name:'',
phone:'',
age:'',
diagnosis:'سكري',
status:'Stable',
history:[]
});

useEffect(()=>{
localStorage.setItem('data',JSON.stringify(patients));
},[patients]);

const save=(e)=>{
e.preventDefault();

const newPatient={
...form,
id:form.id||Date.now(),
history: form.history.length>0 ? form.history : [{
date:new Date().toLocaleDateString(),
type:'كشف',
diagnosis:form.diagnosis,
treatment:'',
tests:'',
note:'تم إنشاء الملف'
}]
};

if(form.id){
setPatients(patients.map(p=>p.id===newPatient.id?newPatient:p));
}else{
setPatients([newPatient,...patients]);
}

setOpen(false);
setForm({name:'',phone:'',age:'',diagnosis:'سكري',status:'Stable',history:[]});
};

return(
<div className="p-6">

<h1 className="text-2xl mb-6">ClinicaPRO</h1>

<button onClick={()=>setOpen(true)} className="bg-blue-600 px-4 py-2 rounded mb-6">
إضافة مريض
</button>

<input
placeholder="بحث..."
className="w-full mb-6 p-3 rounded bg-black"
value={search}
onChange={e=>setSearch(e.target.value)}
/>

<div className="grid gap-4">

{patients
.filter(p=>
p.name.includes(search)||
p.phone.includes(search)||
p.diagnosis.includes(search)
)
.map(p=>(

<div key={p.id} className="bg-black p-4 rounded">

<h2>{p.name}</h2>
<p>{p.diagnosis}</p>

<div className="mt-4">
{p.history.map((h,i)=>(
<div key={i} className="border p-3 mb-2 rounded">

<div>{h.date} - {h.type}</div>
<div>🩺 {h.diagnosis}</div>
<div>💊 {h.treatment}</div>
<div>🧪 {h.tests}</div>
<div>{h.note}</div>

</div>
))}
</div>

</div>

))}

</div>

{open&&(
<div className="fixed inset-0 bg-black flex items-center justify-center">

<form onSubmit={save} className="bg-white text-black p-6 rounded w-80">

<input placeholder="الاسم" required
value={form.name}
onChange={e=>setForm({...form,name:e.target.value})}
className="w-full mb-2 p-2 border"/>

<input placeholder="الهاتف"
value={form.phone}
onChange={e=>setForm({...form,phone:e.target.value})}
className="w-full mb-2 p-2 border"/>

<input placeholder="العمر"
value={form.age}
onChange={e=>setForm({...form,age:e.target.value})}
className="w-full mb-2 p-2 border"/>

<select
value={form.diagnosis}
onChange={e=>setForm({...form,diagnosis:e.target.value})}
className="w-full mb-2 p-2 border">
<option>سكري</option>
<option>ضغط</option>
<option>قلب</option>
</select>

<button className="bg-blue-600 text-white w-full p-2 mt-2">
حفظ
</button>

</form>

</div>
)}

</div>
);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

</body>
</html>
