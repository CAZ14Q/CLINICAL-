<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClinicaPRO | v4.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #05070a; color: #cbd5e1; overflow: hidden; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        .animate-in { animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .glass { background: rgba(13, 17, 29, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
        .input-style { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 1.25rem; padding: 1rem 1.25rem; color: white; outline: none; transition: all 0.3s; width: 100%; text-align: right; }
        .input-style:focus { border-color: #3b82f6; background: rgba(255,255,255,0.06); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // مكون الأيقونات مع معالجة الأخطاء
        const Icon = ({ name, size = 18, className = "" }) => {
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        function App() {
            // البيانات الأساسية
            const [folders, setFolders] = useState(() => JSON.parse(localStorage.getItem('cp_folders')) || [{id: 1, name: 'عام'}]);
            const [patients, setPatients] = useState(() => JSON.parse(localStorage.getItem('cp_patients')) || []);
            const [activeTab, setActiveTab] = useState('home');
            const [searchTerm, setSearchTerm] = useState('');
            const [sidebarOpen, setSidebarOpen] = useState(true);

            // حالات النوافذ المنبثقة
            const [isPatientModal, setIsPatientModal] = useState(false);
            const [isFolderModal, setIsFolderModal] = useState(false);
            const [selectedPatient, setSelectedPatient] = useState(null);
            const [newFolderName, setNewFolderName] = useState('');
            
            // حالة تسجيل مريض جديد
            const [regStep, setRegStep] = useState(1);
            const [formData, setFormData] = useState({
                name: '', phone: '', age: '', gender: 'ذكر', folderId: '',
                bloodType: 'O+', weight: '', height: '', pressure: '',
                chronicDiseases: '', allergies: '', notes: ''
            });

            // حفظ البيانات تلقائياً
            useEffect(() => {
                localStorage.setItem('cp_folders', JSON.stringify(folders));
                localStorage.setItem('cp_patients', JSON.stringify(patients));
                if (window.lucide) window.lucide.createIcons();
            }, [folders, patients, activeTab, isPatientModal, isFolderModal]);

            // دالة إضافة مجلد (قسم)
            const handleAddFolder = (e) => {
                e.preventDefault();
                if (!newFolderName.trim()) return;
                const newF = { id: Date.now(), name: newFolderName };
                setFolders([...folders, newF]);
                setNewFolderName('');
                setIsFolderModal(false);
            };

            // دالة حذف مريض
            const handleDeletePatient = (id) => {
                if (window.confirm('هل أنت متأكد من حذف هذا المريض نهائياً؟')) {
                    setPatients(patients.filter(p => p.id !== id));
                    if (selectedPatient && selectedPatient.id === id) setSelectedPatient(null);
                }
            };

            // دالة حفظ المريض
            const handleSavePatient = (e) => {
                e.preventDefault();
                const folderName = folders.find(f => f.id.toString() === formData.folderId.toString())?.name || 'عام';
                const newP = {
                    ...formData,
                    id: Date.now(),
                    date: new Date().toLocaleDateString('ar-EG'),
                    history: [{
                        date: new Date().toLocaleDateString('ar-EG'),
                        type: 'تسجيل أولي',
                        diagnosis: 'فتح ملف جديد في قسم ' + folderName,
                        treatment: 'مؤشرات حيوية أساسية',
                        note: formData.notes || 'تم إنشاء الملف بنجاح'
                    }]
                };
                setPatients([newP, ...patients]);
                setIsPatientModal(false);
                setRegStep(1);
                setFormData({ name: '', phone: '', age: '', gender: 'ذكر', folderId: '', bloodType: 'O+', weight: '', height: '', pressure: '', chronicDiseases: '', allergies: '', notes: '' });
            };

            const filteredPatients = useMemo(() => {
                return patients.filter(p => p.name.includes(searchTerm) || p.phone.includes(searchTerm));
            }, [patients, searchTerm]);

            return (
                <div className="min-h-screen flex" dir="rtl">
                    {/* Sidebar */}
                    <aside className={`glass border-l border-white/5 transition-all duration-500 flex flex-col ${sidebarOpen ? 'w-80' : 'w-0 opacity-0 overflow-hidden'}`}>
                        <div className="p-8">
                            <div className="flex items-center gap-4 mb-12">
                                <div className="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center text-white shadow-lg shadow-blue-600/30"><Icon name="activity" size={28}/></div>
                                <div><h1 className="font-black text-xl text-white">Clinica<span className="text-blue-500">PRO</span></h1><p className="text-[10px] text-slate-500 uppercase font-bold tracking-widest">Medical OS v4.0</p></div>
                            </div>
                            <nav className="space-y-2">
                                {[
                                    {id:'home', icon:'layout-grid', l:'الرئيسية'},
                                    {id:'search', icon:'search', l:'البحث المتقدم'},
                                    {id:'folders', icon:'folder-plus', l:'إدارة الأقسام'},
                                    {id:'records', icon:'users', l:'سجلات المرضى'}
                                ].map(t => (
                                    <button key={t.id} onClick={() => {setActiveTab(t.id); setSelectedPatient(null)}} className={`w-full flex items-center gap-4 px-5 py-4 rounded-[1.5rem] transition-all ${activeTab === t.id ? 'bg-blue-600 text-white' : 'text-slate-500 hover:bg-white/5'}`}>
                                        <Icon name={t.icon} size={20}/> <span className="font-bold text-sm">{t.l}</span>
                                    </button>
                                ))}
                            </nav>
                        </div>
                    </aside>

                    <main className="flex-1 flex flex-col relative h-screen overflow-hidden">
                        <header className="h-24 px-10 flex items-center justify-between border-b border-white/5 glass">
                            <div className="flex items-center gap-6 flex-1">
                                <button onClick={() => setSidebarOpen(!sidebarOpen)} className="p-3 hover:bg-white/5 rounded-2xl text-blue-500 transition-all"><Icon name="menu"/></button>
                                <h2 className="text-white font-black text-2xl tracking-tighter">
                                    {activeTab === 'home' && 'لوحة القيادة'}
                                    {activeTab === 'search' && 'وحدة البحث'}
                                    {activeTab === 'folders' && 'الأقسام الطبية'}
                                    {activeTab === 'records' && 'قاعدة بيانات المرضى'}
                                </h2>
                            </div>
                            <button onClick={() => setIsPatientModal(true)} className="bg-white text-black px-8 py-3.5 rounded-2xl font-black text-sm flex items-center gap-3 hover:bg-blue-600 hover:text-white transition-all transform active:scale-95 shadow-xl">
                                <Icon name="user-plus" size={20}/> تسجيل مريض جديد
                            </button>
                        </header>

                        <div className="flex-1 overflow-y-auto p-10 custom-scroll">
                            {/* الرئيسية */}
                            {activeTab === 'home' && (
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-8 animate-in">
                                    <div className="glass p-10 rounded-[3rem] col-span-2 relative overflow-hidden">
                                        <h3 className="text-4xl font-black text-white mb-4">أهلاً بك دكتور 👋</h3>
                                        <p className="text-slate-400 max-w-md">النظام يعمل بكفاءة. لديك {patients.length} مريض و {folders.length} أقسام تخصصية.</p>
                                        <Icon name="activity" size={150} className="absolute -right-5 -bottom-5 text-white/5"/>
                                    </div>
                                    <div className="glass p-10 rounded-[3rem] flex flex-col justify-center items-center">
                                        <div className="text-6xl font-black text-blue-500 mb-2">{patients.length}</div>
                                        <p className="text-slate-500 font-bold uppercase text-xs">إجمالي المرضى</p>
                                    </div>
                                </div>
                            )}

                            {/* البحث */}
                            {activeTab === 'search' && (
                                <div className="max-w-4xl mx-auto animate-in">
                                    <div className="relative mb-8">
                                        <input type="text" placeholder="ابحث بالاسم أو الهاتف..." className="input-style !py-8 !px-12 !text-2xl" value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} />
                                        <Icon name="search" className="absolute left-10 top-8 text-blue-500" size={32}/>
                                    </div>
                                    <div className="space-y-4">
                                        {searchTerm && filteredPatients.map(p => (
                                            <div key={p.id} onClick={() => {setSelectedPatient(p); setActiveTab('records')}} className="glass p-6 rounded-3xl flex justify-between items-center cursor-pointer hover:border-blue-500/50 transition-all">
                                                <div className="flex items-center gap-4">
                                                    <div className="w-12 h-12 bg-blue-600 rounded-xl flex items-center justify-center font-bold text-white">{p.name[0]}</div>
                                                    <div><h4 className="text-white font-bold">{p.name}</h4><p className="text-slate-500 text-sm">{p.phone}</p></div>
                                                </div>
                                                <Icon name="chevron-left" className="text-slate-600"/>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {/* المجلدات */}
                            {activeTab === 'folders' && (
                                <div className="grid grid-cols-1 md:grid-cols-4 gap-6 animate-in">
                                    {folders.map(f => (
                                        <div key={f.id} className="glass p-8 rounded-[2.5rem] group hover:border-blue-500/30 transition-all">
                                            <Icon name="folder" size={40} className="text-blue-500 mb-4"/>
                                            <h3 className="text-white font-bold text-lg">{f.name}</h3>
                                            <p className="text-slate-500 text-xs mt-2">{patients.filter(p => p.folderId.toString() === f.id.toString()).length} مريض</p>
                                        </div>
                                    ))}
                                    <button onClick={() => setIsFolderModal(true)} className="border-2 border-dashed border-white/10 rounded-[2.5rem] p-8 flex flex-col items-center justify-center text-slate-500 hover:text-white hover:border-blue-500 transition-all">
                                        <Icon name="plus" size={32} className="mb-2"/> <span className="font-bold">قسم جديد</span>
                                    </button>
                                </div>
                            )}

                            {/* سجلات المرضى */}
                            {activeTab === 'records' && !selectedPatient && (
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 animate-in">
                                    {patients.map(p => (
                                        <div key={p.id} className="glass p-8 rounded-[3rem] relative group border border-transparent hover:border-blue-500/20">
                                            <div onClick={() => setSelectedPatient(p)} className="cursor-pointer">
                                                <div className="flex items-center gap-4 mb-6">
                                                    <div className="w-14 h-14 bg-blue-600/10 text-blue-500 rounded-2xl flex items-center justify-center text-2xl font-black">{p.name[0]}</div>
                                                    <div><h4 className="text-white font-bold">{p.name}</h4><p className="text-slate-500 text-xs">عمر: {p.age}</p></div>
                                                </div>
                                            </div>
                                            <button onClick={() => handleDeletePatient(p.id)} className="absolute top-8 left-8 text-slate-700 hover:text-red-500 transition-colors">
                                                <Icon name="trash-2" size={18}/>
                                            </button>
                                        </div>
                                    ))}
                                </div>
                            )}

                            {/* الملف الشخصي للمريض */}
                            {selectedPatient && (
                                <div className="animate-in max-w-5xl mx-auto">
                                    <div className="flex justify-between items-center mb-8">
                                        <button onClick={() => setSelectedPatient(null)} className="text-slate-500 hover:text-white flex items-center gap-2 font-bold"><Icon name="arrow-right"/> عودة</button>
                                        <button onClick={() => handleDeletePatient(selectedPatient.id)} className="bg-red-500/10 text-red-500 px-6 py-2 rounded-xl text-xs font-bold hover:bg-red-500 hover:text-white transition-all">حذف الملف</button>
                                    </div>
                                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                                        <div className="glass p-8 rounded-[3rem] text-center">
                                            <div className="w-20 h-20 bg-blue-600 rounded-3xl mx-auto mb-4 flex items-center justify-center text-3xl text-white font-black">{selectedPatient.name[0]}</div>
                                            <h3 className="text-2xl font-bold text-white">{selectedPatient.name}</h3>
                                            <p className="text-slate-500 mt-2">{selectedPatient.phone}</p>
                                            <div className="mt-6 space-y-2">
                                                <div className="flex justify-between p-3 bg-white/5 rounded-xl"><span>فصيلة الدم</span><span className="text-red-500 font-bold">{selectedPatient.bloodType}</span></div>
                                                <div className="flex justify-between p-3 bg-white/5 rounded-xl"><span>الوزن</span><span className="text-white font-bold">{selectedPatient.weight} كجم</span></div>
                                            </div>
                                        </div>
                                        <div className="lg:col-span-2 glass p-8 rounded-[3rem]">
                                            <h4 className="text-xl font-bold text-white mb-6">التاريخ الطبي</h4>
                                            {selectedPatient.history.map((h, i) => (
                                                <div key={i} className="border-r-2 border-blue-600/20 pr-6 pb-6 relative">
                                                    <div className="absolute -right-[9px] top-0 w-4 h-4 bg-blue-600 rounded-full"></div>
                                                    <div className="bg-white/5 p-4 rounded-2xl">
                                                        <div className="flex justify-between text-xs mb-2 text-slate-500"><span>{h.type}</span><span>{h.date}</span></div>
                                                        <p className="text-white font-bold">{h.diagnosis}</p>
                                                        <p className="text-slate-400 text-sm mt-1">{h.note}</p>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    </main>

                    {/* نافذة تسجيل مريض */}
                    {isPatientModal && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/90 backdrop-blur-md p-6">
                            <form onSubmit={handleSavePatient} className="bg-[#0d111d] w-full max-w-2xl rounded-[3rem] p-10 border border-white/10 relative">
                                <button type="button" onClick={() => setIsPatientModal(false)} className="absolute top-8 left-8 text-slate-500 hover:text-white"><Icon name="x" size={28}/></button>
                                <h3 className="text-2xl font-black text-white mb-8">تسجيل مريض جديد</h3>
                                
                                <div className="space-y-6">
                                    <input required className="input-style" placeholder="اسم المريض بالكامل" value={formData.name} onChange={e=>setFormData({...formData, name:e.target.value})} />
                                    <div className="grid grid-cols-2 gap-4">
                                        <select required className="input-style" value={formData.folderId} onChange={e=>setFormData({...formData, folderId:e.target.value})}>
                                            <option value="">اختر القسم التخصصي...</option>
                                            {folders.map(f => <option key={f.id} value={f.id}>{f.name}</option>)}
                                        </select>
                                        <input className="input-style" placeholder="رقم الجوال" value={formData.phone} onChange={e=>setFormData({...formData, phone:e.target.value})} />
                                    </div>
                                    <div className="grid grid-cols-3 gap-4">
                                        <input className="input-style" placeholder="العمر" type="number" value={formData.age} onChange={e=>setFormData({...formData, age:e.target.value})} />
                                        <input className="input-style" placeholder="الوزن" value={formData.weight} onChange={e=>setFormData({...formData, weight:e.target.value})} />
                                        <select className="input-style" value={formData.bloodType} onChange={e=>setFormData({...formData, bloodType:e.target.value})}><option>O+</option><option>A+</option><option>B+</option><option>AB+</option></select>
                                    </div>
                                </div>
                                <button type="submit" className="mt-8 bg-blue-600 text-white w-full py-4 rounded-2xl font-bold text-lg shadow-lg shadow-blue-600/20 transition-all hover:bg-blue-500">حفظ ملف المريض</button>
                            </form>
                        </div>
                    )}

                    {/* نافذة إضافة قسم */}
                    {isFolderModal && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/90 backdrop-blur-md p-4">
                            <form onSubmit={handleAddFolder} className="bg-[#0d111d] w-full max-w-md rounded-[2.5rem] p-8 border border-white/10">
                                <h3 className="text-xl font-bold text-white mb-6">إنشاء قسم تخصصي جديد</h3>
                                <input autoFocus required className="input-style mb-6" placeholder="مثلاً: عيادة الباطنية" value={newFolderName} onChange={e => setNewFolderName(e.target.value)} />
                                <div className="flex gap-4">
                                    <button type="submit" className="flex-1 bg-blue-600 py-4 rounded-2xl text-white font-bold">إنشاء القسم</button>
                                    <button type="button" onClick={() => setIsFolderModal(false)} className="px-6 text-slate-500">إلغاء</button>
                                </div>
                            </form>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
