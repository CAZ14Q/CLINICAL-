<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClinicaPRO | Advanced Medical Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #070912; color: #cbd5e1; overflow-hidden; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        .animate-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .glass-card { background: rgba(13, 17, 29, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const Icon = ({ name, size = 18, className = "" }) => {
            useEffect(() => { if(window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        function App() {
            const [patients, setPatients] = useState(() => JSON.parse(localStorage.getItem('c_p_data')) || []);
            const [activeTab, setActiveTab] = useState('dashboard');
            const [sidebarOpen, setSidebarOpen] = useState(true);
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [selectedPatient, setSelectedPatient] = useState(null); // لعرض الملف الطبي الشامل
            const [formData, setFormData] = useState({ name: '', phone: '', age: '', status: 'Stable', diagnosis: '', joinDate: new Date().toISOString().split('T')[0] });

            useEffect(() => {
                localStorage.setItem('c_p_data', JSON.stringify(patients));
            }, [patients]);

            // تجميع المرضى حسب التشخيص (الملفات الطبية)
            const groupedPatients = useMemo(() => {
                return patients.reduce((acc, p) => {
                    const diag = p.diagnosis || "تشخيص غير محدد";
                    if (!acc[diag]) acc[diag] = [];
                    acc[diag].push(p);
                    return acc;
                }, {});
            }, [patients]);

            const handleSave = (e) => {
                e.preventDefault();
                const newPatient = { ...formData, id: formData.id || Date.now(), visits: formData.visits || [{date: formData.joinDate, note: 'تم فتح الملف الطبي'}] };
                if(formData.id) setPatients(patients.map(p => p.id === newPatient.id ? newPatient : p));
                else setPatients([newPatient, ...patients]);
                setIsModalOpen(false);
                resetForm();
            };

            const resetForm = () => setFormData({ name: '', phone: '', age: '', status: 'Stable', diagnosis: '', joinDate: new Date().toISOString().split('T')[0] });

            return (
                <div className="min-h-screen flex bg-[#070912]" dir="rtl">
                    
                    {/* Sidebar */}
                    <aside className={`bg-[#0d111d] border-l border-white/5 flex flex-col transition-all duration-500 ${sidebarOpen ? 'w-72' : 'w-0 overflow-hidden'}`}>
                        <div className="p-8 flex-1">
                            <div className="flex items-center gap-3 mb-12">
                                <div className="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white shadow-lg shadow-blue-600/30"><Icon name="activity" size={24}/></div>
                                <h1 className="font-black text-lg text-white">Clinica<span className="text-blue-500">PRO</span></h1>
                            </div>
                            <nav className="space-y-2">
                                {[
                                    {id:'dashboard', icon:'layout-dashboard', l:'لوحة التحكم'}, 
                                    {id:'folders', icon:'folder-medical', l:'سجلات الأمراض'},
                                    {id:'records', icon:'users', l:'قائمة المرضى'}, 
                                    {id:'appointments', icon:'calendar', l:'المواعيد'}
                                ].map(t => (
                                    <button key={t.id} onClick={() => {setActiveTab(t.id); setSelectedPatient(null)}} className={`w-full flex items-center gap-4 px-4 py-4 rounded-2xl transition-all ${activeTab === t.id ? 'bg-blue-600 text-white' : 'hover:bg-white/5 text-slate-500'}`}>
                                        <Icon name={t.icon}/> <span className="font-bold text-sm">{t.l}</span>
                                    </button>
                                ))}
                            </nav>
                        </div>
                    </aside>

                    {/* Main Content */}
                    <main className="flex-1 flex flex-col h-screen overflow-hidden relative">
                        <button onClick={() => setSidebarOpen(!sidebarOpen)} className="absolute top-6 right-6 z-50 w-10 h-10 bg-blue-600/10 border border-blue-500/20 rounded-xl flex items-center justify-center text-blue-500"><Icon name={sidebarOpen ? "chevron-right" : "menu"}/></button>

                        <header className="h-24 px-10 flex items-center justify-between border-b border-white/5">
                            <h2 className="text-2xl font-black text-white">
                                {activeTab === 'dashboard' && 'نظرة عامة'}
                                {activeTab === 'folders' && 'أرشيف الأمراض التخصصي'}
                                {activeTab === 'records' && 'السجلات المركزية'}
                                {activeTab === 'appointments' && 'الجدول الزمني'}
                            </h2>
                            <button onClick={() => {resetForm(); setIsModalOpen(true)}} className="bg-blue-600 hover:bg-blue-500 text-white px-8 py-3 rounded-2xl font-black text-sm flex items-center gap-2 transition-all active:scale-95">
                                <Icon name="plus-circle" size={20}/> إضافة حالة جديدة
                            </button>
                        </header>

                        <div className="flex-1 overflow-y-auto p-10 custom-scroll">
                            {/* عرض الملف الشخصي الشامل للمريض */}
                            {selectedPatient ? (
                                <div className="max-w-4xl mx-auto animate-in">
                                    <button onClick={() => setSelectedPatient(null)} className="mb-6 flex items-center gap-2 text-slate-500 hover:text-white transition-colors">
                                        <Icon name="arrow-right"/> العودة للقائمة
                                    </button>
                                    
                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                        <div className="md:col-span-1 space-y-6">
                                            <div className="bg-[#0d111d] p-8 rounded-[2.5rem] border border-white/5 text-center">
                                                <div className="w-24 h-24 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-3xl mx-auto mb-4 flex items-center justify-center text-4xl font-black text-white">{selectedPatient.name[0]}</div>
                                                <h3 className="text-xl font-black text-white">{selectedPatient.name}</h3>
                                                <p className="text-blue-500 font-bold text-sm mt-1">{selectedPatient.diagnosis}</p>
                                            </div>
                                            <div className="bg-[#0d111d] p-6 rounded-[2rem] border border-white/5 space-y-4">
                                                <div className="flex justify-between border-b border-white/5 pb-2"><span className="text-slate-500 text-sm">العمر</span><span className="text-white font-bold">{selectedPatient.age} سنة</span></div>
                                                <div className="flex justify-between border-b border-white/5 pb-2"><span className="text-slate-500 text-sm">الحالة</span><span className={`font-bold ${selectedPatient.status === 'Critical' ? 'text-red-500' : 'text-green-500'}`}>{selectedPatient.status}</span></div>
                                                <div className="flex justify-between"><span className="text-slate-500 text-sm">الهاتف</span><span className="text-white font-bold">{selectedPatient.phone}</span></div>
                                            </div>
                                        </div>

                                        <div className="md:col-span-2">
                                            <div className="bg-[#0d111d] p-8 rounded-[2.5rem] border border-white/5 min-h-full">
                                                <h4 className="text-white font-black mb-8 flex items-center gap-2"><Icon name="history" className="text-blue-500"/> التاريخ المرضي والتطور</h4>
                                                <div className="relative border-r-2 border-blue-600/20 pr-8 mr-4 space-y-10">
                                                    {selectedPatient.visits.map((visit, idx) => (
                                                        <div key={idx} className="relative">
                                                            <div className="absolute -right-[41px] top-0 w-4 h-4 bg-blue-600 rounded-full border-4 border-[#0d111d]"></div>
                                                            <div className="bg-white/5 p-5 rounded-2xl border border-white/5">
                                                                <span className="text-[10px] font-black text-blue-500 uppercase">{visit.date}</span>
                                                                <p className="text-white mt-2 leading-relaxed">{visit.note}</p>
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            ) : (
                                <div className="max-w-7xl mx-auto">
                                    {/* تبويب سجلات الأمراض (الملفات) */}
                                    {activeTab === 'folders' && (
                                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6 animate-in">
                                            {Object.keys(groupedPatients).map(folder => (
                                                <div key={folder} className="bg-[#0d111d] p-8 rounded-[2.5rem] border border-white/5 hover:border-blue-500/50 transition-all group cursor-pointer" onClick={() => setActiveTab('records')}>
                                                    <div className="flex justify-between items-start mb-6">
                                                        <div className="w-14 h-14 bg-blue-600/10 rounded-2xl flex items-center justify-center text-blue-500 group-hover:bg-blue-600 group-hover:text-white transition-all"><Icon name="folder" size={28}/></div>
                                                        <span className="bg-white/5 px-4 py-1 rounded-full text-[10px] font-black text-slate-400">{groupedPatients[folder].length} مريض</span>
                                                    </div>
                                                    <h3 className="text-xl font-black text-white mb-2">{folder}</h3>
                                                    <p className="text-slate-500 text-xs leading-relaxed italic">انقر لاستعراض جميع الحالات المسجلة تحت هذا التشخيص.</p>
                                                </div>
                                            ))}
                                        </div>
                                    )}

                                    {/* تبويب قائمة المرضى */}
                                    {activeTab === 'records' && (
                                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 animate-in">
                                            {patients.map(p => (
                                                <div key={p.id} className="bg-[#0d111d] p-6 rounded-[2.5rem] border border-white/5 group hover:bg-blue-600/5 transition-all">
                                                    <div className="flex gap-4 mb-6">
                                                        <div className="w-14 h-14 bg-gradient-to-br from-blue-600 to-indigo-600 rounded-2xl flex items-center justify-center text-white font-black text-2xl shadow-lg">{p.name[0]}</div>
                                                        <div>
                                                            <h4 className="text-white font-bold text-lg">{p.name}</h4>
                                                            <span className="bg-blue-500/10 text-blue-500 px-2 py-0.5 rounded text-[10px] font-black uppercase">{p.diagnosis}</span>
                                                        </div>
                                                    </div>
                                                    <div className="flex gap-2">
                                                        <button onClick={() => setSelectedPatient(p)} className="flex-1 bg-white/5 hover:bg-blue-600 py-3 rounded-2xl text-[11px] font-black text-white transition-all">فتح الملف الطبي</button>
                                                        <button onClick={() => {setFormData(p); setIsModalOpen(true)}} className="p-3 bg-white/5 rounded-2xl hover:text-yellow-500 transition-colors border border-white/5"><Icon name="edit-3" size={16}/></button>
                                                        <button onClick={() => setPatients(patients.filter(it => it.id !== p.id))} className="p-3 bg-white/5 rounded-2xl hover:text-red-500 transition-colors border border-white/5"><Icon name="trash-2" size={16}/></button>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    )}

                                    {/* لوحة التحكم المختصرة */}
                                    {activeTab === 'dashboard' && (
                                        <div className="space-y-8 animate-in">
                                            <div className="grid grid-cols-1 md:grid-cols-4 gap-6">
                                                <div className="bg-[#0d111d] p-8 rounded-[2.5rem] border border-white/5"><p className="text-[10px] font-black text-slate-500 uppercase mb-2">إجمالي المرضى</p><div className="text-5xl font-black text-blue-500">{patients.length}</div></div>
                                                <div className="bg-[#0d111d] p-8 rounded-[2.5rem] border border-white/5"><p className="text-[10px] font-black text-slate-500 uppercase mb-2">ملفات التخصصات</p><div className="text-5xl font-black text-indigo-500">{Object.keys(groupedPatients).length}</div></div>
                                                <div className="bg-gradient-to-br from-blue-600 to-indigo-700 p-8 rounded-[2.5rem] md:col-span-2 relative overflow-hidden">
                                                    <div className="relative z-10 text-white"><h3 className="text-2xl font-black">جاهزية النظام الذكي</h3><p className="opacity-80 text-sm mt-2">يقوم النظام حالياً بتحليل {patients.length} سجل طبي لتوقع مواعيد المراجعة القادمة.</p></div>
                                                    <Icon name="zap" size={120} className="absolute -right-4 -bottom-4 opacity-10 text-white"/>
                                                </div>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            )}
                        </div>
                    </main>

                    {/* Modal لإضافة/تعديل مريض */}
                    {isModalOpen && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/90 backdrop-blur-xl p-4 animate-in">
                            <div className="bg-[#0d111d] w-full max-w-xl rounded-[3rem] p-10 border border-white/10 relative shadow-2xl">
                                <button onClick={() => setIsModalOpen(false)} className="absolute top-8 left-8 text-slate-500 hover:text-white"><Icon name="x"/></button>
                                <h3 className="text-2xl font-black text-white mb-8">{formData.id ? 'تحديث البيانات' : 'إضافة مريض للمنظومة'}</h3>
                                <form onSubmit={handleSave} className="space-y-4">
                                    <div className="grid grid-cols-2 gap-4">
                                        <input placeholder="اسم المريض بالكامل" required className="col-span-2 w-full bg-white/5 border border-white/10 rounded-2xl p-4 text-white focus:border-blue-500 outline-none transition-all" value={formData.name} onChange={e => setFormData({...formData, name:e.target.value})} />
                                        <input placeholder="رقم الجوال" className="w-full bg-white/5 border border-white/10 rounded-2xl p-4 text-white focus:border-blue-500 outline-none" value={formData.phone} onChange={e => setFormData({...formData, phone:e.target.value})} />
                                        <input placeholder="العمر" type="number" className="w-full bg-white/5 border border-white/10 rounded-2xl p-4 text-white focus:border-blue-500 outline-none" value={formData.age} onChange={e => setFormData({...formData, age:e.target.value})} />
                                        <input placeholder="التشخيص (مثال: سكري، ضغط...)" required className="col-span-2 w-full bg-white/5 border border-white/10 rounded-2xl p-4 text-white focus:border-blue-500 outline-none" value={formData.diagnosis} onChange={e => setFormData({...formData, diagnosis:e.target.value})} />
                                        <select className="col-span-2 w-full bg-white/5 border border-white/10 rounded-2xl p-4 text-white outline-none" value={formData.status} onChange={e => setFormData({...formData, status:e.target.value})}>
                                            <option value="Stable">الحالة: مستقر</option>
                                            <option value="Critical">الحالة: حرج</option>
                                            <option value="Follow-up">مراجعة دورية</option>
                                        </select>
                                    </div>
                                    <button type="submit" className="w-full bg-blue-600 hover:bg-blue-500 py-5 rounded-2xl text-white font-black text-lg shadow-lg shadow-blue-600/20 transition-all mt-4">حفظ السجل الطبي</button>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
