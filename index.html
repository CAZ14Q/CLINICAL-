<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClinicaPRO | Intelligence Unit</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #070912; color: #cbd5e1; overflow: hidden; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        .animate-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const Icon = ({ name, size = 18, className = "" }) => {
            useEffect(() => { if(window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        function App() {
            const [folders, setFolders] = useState(() => JSON.parse(localStorage.getItem('cp_folders')) || []);
            const [patients, setPatients] = useState(() => JSON.parse(localStorage.getItem('cp_patients')) || []);
            const [activeTab, setActiveTab] = useState('folders');
            const [sidebarOpen, setSidebarOpen] = useState(true);
            const [searchTerm, setSearchTerm] = useState('');
            
            // حالات النوافذ (Modals)
            const [isFolderModal, setIsFolderModal] = useState(false);
            const [isPatientModal, setIsPatientModal] = useState(false);
            const [selectedFolder, setSelectedFolder] = useState(null);
            const [selectedPatient, setSelectedPatient] = useState(null);

            // بيانات النماذج
            const [newFolderName, setNewFolderName] = useState('');
            const [formData, setFormData] = useState({ name: '', phone: '', age: '', status: 'Stable', notes: '' });

            useEffect(() => {
                localStorage.setItem('cp_folders', JSON.stringify(folders));
                localStorage.setItem('cp_patients', JSON.stringify(patients));
            }, [folders, patients]);

            // نظام البحث
            const filteredPatients = useMemo(() => {
                return patients.filter(p => p.name.includes(searchTerm) || p.phone.includes(searchTerm));
            }, [patients, searchTerm]);

            const handleAddFolder = (e) => {
                e.preventDefault();
                const folder = { id: Date.now(), name: newFolderName };
                setFolders([...folders, folder]);
                setNewFolderName('');
                setIsFolderModal(false);
            };

            const handleAddPatient = (e) => {
                e.preventDefault();
                const newP = { 
                    ...formData, 
                    id: Date.now(), 
                    folderId: selectedFolder.id,
                    date: new Date().toLocaleDateString('ar-EG'),
                    history: [{date: 'اليوم', title: 'فتح الملف', note: formData.notes || 'تم تسجيل المريض في القسم'}]
                };
                setPatients([newP, ...patients]);
                setIsPatientModal(false);
                setFormData({ name: '', phone: '', age: '', status: 'Stable', notes: '' });
            };

            return (
                <div className="min-h-screen flex overflow-hidden" dir="rtl">
                    
                    {/* Sidebar */}
                    <aside className={`bg-[#0d111d] border-l border-white/5 flex flex-col transition-all duration-500 ${sidebarOpen ? 'w-72' : 'w-0 opacity-0 overflow-hidden'}`}>
                        <div className="p-8 flex-1">
                            <div className="flex items-center gap-3 mb-12">
                                <div className="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white shadow-lg shadow-blue-600/20"><Icon name="activity" size={24}/></div>
                                <h1 className="font-black text-lg text-white">Clinica<span className="text-blue-500">PRO</span></h1>
                            </div>
                            <nav className="space-y-2">
                                {[{id:'folders', icon:'folder-medical', l:'سجلات الأمراض'}, {id:'search', icon:'search', l:'بحث شامل'}].map(t => (
                                    <button key={t.id} onClick={() => {setActiveTab(t.id); setSelectedFolder(null); setSelectedPatient(null)}} className={`w-full flex items-center gap-4 px-4 py-4 rounded-2xl transition-all ${activeTab === t.id ? 'bg-blue-600 text-white shadow-lg' : 'hover:bg-white/5 text-slate-500'}`}>
                                        <Icon name={t.icon}/> <span className="font-bold text-sm">{t.l}</span>
                                    </button>
                                ))}
                            </nav>
                        </div>
                    </aside>

                    {/* Main Content */}
                    <main className="flex-1 flex flex-col relative h-screen overflow-hidden">
                        
                        <header className="h-24 bg-[#070912]/80 backdrop-blur-md border-b border-white/5 flex items-center justify-between px-8">
                            <div className="flex items-center gap-4 flex-1">
                                <button onClick={() => setSidebarOpen(!sidebarOpen)} className="w-10 h-10 bg-white/5 rounded-xl flex items-center justify-center text-blue-500 hover:bg-white/10 transition-all"><Icon name="menu" size={20}/></button>
                                <div className="relative w-full max-w-md">
                                    <Icon name="search" className="absolute right-4 top-3.5 text-slate-500" size={16}/>
                                    <input 
                                        type="text" 
                                        placeholder="ابحث عن مريض بالاسم أو الهاتف..." 
                                        className="w-full bg-white/5 border border-white/10 rounded-2xl py-3 pr-12 pl-4 text-sm text-white outline-none focus:border-blue-500/50 transition-all"
                                        value={searchTerm}
                                        onChange={(e) => {setSearchTerm(e.target.value); setActiveTab('search')}}
                                    />
                                </div>
                            </div>
                            {activeTab === 'folders' && !selectedFolder && (
                                <button onClick={() => setIsFolderModal(true)} className="bg-blue-600 hover:bg-blue-500 text-white px-6 py-2.5 rounded-2xl font-black text-sm flex items-center gap-2">
                                    <Icon name="plus" size={18}/> ملف مرض جديد
                                </button>
                            )}
                        </header>

                        <div className="flex-1 overflow-y-auto p-8 custom-scroll">
                            
                            {/* عرض المجلدات (أرشيف الأمراض) */}
                            {activeTab === 'folders' && !selectedFolder && (
                                <div className="grid grid-cols-1 md:grid-cols-4 gap-6 animate-in">
                                    {folders.map(f => (
                                        <div key={f.id} onClick={() => setSelectedFolder(f)} className="bg-[#0d111d] p-8 rounded-[2.5rem] border border-white/5 hover:border-blue-500/30 transition-all cursor-pointer group">
                                            <Icon name="folder" size={40} className="text-blue-500 mb-4 group-hover:scale-110 transition-transform"/>
                                            <h3 className="text-white font-black text-lg">{f.name}</h3>
                                            <p className="text-slate-500 text-[10px] mt-2 font-bold uppercase">{patients.filter(p => p.folderId === f.id).length} مريض مسجل</p>
                                        </div>
                                    ))}
                                </div>
                            )}

                            {/* داخل المجلد (قائمة المرضى التابعين له) */}
                            {selectedFolder && !selectedPatient && (
                                <div className="max-w-6xl mx-auto animate-in">
                                    <button onClick={() => setSelectedFolder(null)} className="mb-6 text-slate-500 hover:text-white flex items-center gap-2 font-bold"><Icon name="arrow-right"/> العودة للأرشيف</button>
                                    <div className="flex justify-between items-center mb-10 bg-[#0d111d] p-8 rounded-[2.5rem] border border-white/5">
                                        <div><span className="text-blue-500 font-black text-xs uppercase">ملف التخصص</span><h2 className="text-3xl font-black text-white">{selectedFolder.name}</h2></div>
                                        <button onClick={() => setIsPatientModal(true)} className="bg-white text-black px-8 py-3 rounded-2xl font-black flex items-center gap-2 hover:bg-blue-600 hover:text-white transition-all"><Icon name="user-plus"/> إضافة مريض للملف</button>
                                    </div>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        {patients.filter(p => p.folderId === selectedFolder.id).map(p => (
                                            <div key={p.id} className="bg-[#0d111d] p-5 rounded-3xl border border-white/5 flex justify-between items-center group">
                                                <div className="flex items-center gap-4">
                                                    <div className="w-12 h-12 bg-blue-600/10 text-blue-500 rounded-xl flex items-center justify-center font-black">{p.name[0]}</div>
                                                    <div><h4 className="text-white font-bold">{p.name}</h4><p className="text-slate-500 text-[10px]">{p.phone}</p></div>
                                                </div>
                                                <button onClick={() => setSelectedPatient(p)} className="bg-white/5 hover:bg-blue-600 text-white px-5 py-2.5 rounded-xl text-[10px] font-black transition-all">فتح الملف الطبي</button>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {/* الملف الطبي الشامل */}
                            {selectedPatient && (
                                <div className="max-w-5xl mx-auto animate-in pb-20">
                                    <button onClick={() => setSelectedPatient(null)} className="mb-6 text-slate-500 hover:text-white flex items-center gap-2 font-bold"><Icon name="arrow-right"/> رجوع للقائمة</button>
                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                                        <div className="bg-[#0d111d] p-8 rounded-[3rem] border border-white/5 text-center h-fit">
                                            <div className="w-24 h-24 bg-blue-600 rounded-[2rem] mx-auto mb-6 flex items-center justify-center text-4xl text-white font-black">{selectedPatient.name[0]}</div>
                                            <h3 className="text-2xl font-black text-white mb-2">{selectedPatient.name}</h3>
                                            <span className="bg-blue-500/10 text-blue-500 px-4 py-1 rounded-full text-xs font-black">{selectedPatient.status}</span>
                                            <div className="mt-8 pt-8 border-t border-white/5 space-y-4 text-right">
                                                <div className="flex justify-between"><span className="text-slate-500 text-sm">العمر</span><span className="text-white font-bold">{selectedPatient.age}</span></div>
                                                <div className="flex justify-between"><span className="text-slate-500 text-sm">الجوال</span><span className="text-white font-bold">{selectedPatient.phone}</span></div>
                                            </div>
                                        </div>
                                        <div className="md:col-span-2 bg-[#0d111d] p-10 rounded-[3rem] border border-white/5 min-h-[500px]">
                                            <h4 className="text-white font-black mb-10 flex items-center gap-3"><Icon name="history" className="text-blue-500"/> التطور التاريخي للحالة</h4>
                                            <div className="relative border-r-2 border-white/10 pr-8 mr-2 space-y-10">
                                                {selectedPatient.history.map((h, i) => (
                                                    <div key={i} className="relative">
                                                        <div className="absolute -right-[42px] top-0 w-5 h-5 bg-blue-600 rounded-full border-4 border-[#070912]"></div>
                                                        <div className="bg-white/5 p-6 rounded-3xl border border-white/5">
                                                            <div className="flex justify-between mb-2 font-black text-[10px]"><span className="text-blue-500 uppercase">{h.title}</span><span className="text-slate-500">{h.date}</span></div>
                                                            <p className="text-slate-300 text-sm leading-relaxed">{h.note}</p>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* صفحة البحث */}
                            {activeTab === 'search' && !selectedPatient && (
                                <div className="max-w-5xl mx-auto animate-in">
                                    <h3 className="text-white font-black mb-6 flex items-center gap-2"><Icon name="users" className="text-blue-500"/> نتائج البحث عن: {searchTerm}</h3>
                                    <div className="grid grid-cols-1 gap-4">
                                        {filteredPatients.length > 0 ? filteredPatients.map(p => (
                                            <div key={p.id} className="bg-[#0d111d] p-5 rounded-3xl border border-white/5 flex justify-between items-center group">
                                                <div className="flex items-center gap-4">
                                                    <div className="w-12 h-12 bg-blue-600/10 text-blue-500 rounded-xl flex items-center justify-center font-black">{p.name[0]}</div>
                                                    <div>
                                                        <h4 className="text-white font-bold">{p.name}</h4>
                                                        <p className="text-slate-500 text-[10px]">قسم: {folders.find(f => f.id === p.folderId)?.name || 'غير محدد'}</p>
                                                    </div>
                                                </div>
                                                <button onClick={() => setSelectedPatient(p)} className="bg-blue-600 text-white px-6 py-2.5 rounded-xl text-[10px] font-black hover:bg-blue-500 transition-all">فتح الملف</button>
                                            </div>
                                        )) : <p className="text-center text-slate-500 py-20">لم يتم العثور على نتائج.</p>}
                                    </div>
                                </div>
                            )}
                        </div>
                    </main>

                    {/* نافذة إضافة مجلد مرض */}
                    {isFolderModal && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/90 backdrop-blur-xl p-4 animate-in">
                            <form onSubmit={handleAddFolder} className="bg-[#0d111d] w-full max-w-md rounded-[3rem] p-10 border border-white/10 shadow-2xl">
                                <h3 className="text-2xl font-black text-white mb-6">تسمية المجلد الجديد</h3>
                                <input placeholder="مثلاً: مرضى القلب، مراجعات السكر..." required className="w-full bg-white/5 border border-white/10 rounded-2xl p-5 text-white outline-none focus:border-blue-500 mb-6" value={newFolderName} onChange={e => setNewFolderName(e.target.value)} />
                                <div className="flex gap-4">
                                    <button type="submit" className="flex-1 bg-blue-600 py-4 rounded-2xl text-white font-black hover:bg-blue-500">إنشاء المجلد</button>
                                    <button type="button" onClick={() => setIsFolderModal(false)} className="px-6 text-slate-500 font-bold">إلغاء</button>
                                </div>
                            </form>
                        </div>
                    )}

                    {/* نافذة إضافة مريض داخل مجلد */}
                    {isPatientModal && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/90 backdrop-blur-xl p-4 animate-in">
                            <form onSubmit={handleAddPatient} className="bg-[#0d111d] w-full max-w-xl rounded-[3rem] p-10 border border-white/10 shadow-2xl">
                                <h3 className="text-2xl font-black text-white mb-8">إضافة مريض لـ {selectedFolder?.name}</h3>
                                <div className="grid grid-cols-2 gap-4 mb-6">
                                    <input placeholder="الاسم الرباعي" required className="col-span-2 w-full bg-white/5 border border-white/10 rounded-2xl p-4 text-white outline-none focus:border-blue-500" value={formData.name} onChange={e => setFormData({...formData, name:e.target.value})} />
                                    <input placeholder="رقم الهاتف" className="w-full bg-white/5 border border-white/10 rounded-2xl p-4 text-white outline-none" value={formData.phone} onChange={e => setFormData({...formData, phone:e.target.value})} />
                                    <input placeholder="العمر" type="number" className="w-full bg-white/5 border border-white/10 rounded-2xl p-4 text-white outline-none" value={formData.age} onChange={e => setFormData({...formData, age:e.target.value})} />
                                    <select className="col-span-2 w-full bg-white/5 border border-white/10 rounded-2xl p-4 text-white outline-none" value={formData.status} onChange={e => setFormData({...formData, status:e.target.value})}>
                                        <option value="Stable">الحالة: مستقر</option>
                                        <option value="Critical">الحالة: حرج</option>
                                    </select>
                                    <textarea placeholder="ملاحظات أولية..." className="col-span-2 w-full bg-white/5 border border-white/10 rounded-2xl p-4 text-white h-24 outline-none" value={formData.notes} onChange={e => setFormData({...formData, notes:e.target.value})}></textarea>
                                </div>
                                <button type="submit" className="w-full bg-blue-600 py-5 rounded-2xl text-white font-black text-lg shadow-lg">حفظ المريض في هذا الملف</button>
                            </form>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
