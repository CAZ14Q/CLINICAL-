<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClinicaPRO | Intelligence Unit</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #070912; color: #cbd5e1; overflow: hidden; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        .animate-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Icon = ({ name, size = 18, className = "" }) => {
            useEffect(() => { if(window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        function App() {
            const [patients, setPatients] = useState(() => JSON.parse(localStorage.getItem('c_p_data')) || []);
            const [activeTab, setActiveTab] = useState('dashboard');
            const [sidebarOpen, setSidebarOpen] = useState(true);
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [isEditMode, setIsEditMode] = useState(false);
            const [formData, setFormData] = useState({ name: '', phone: '', age: '', status: 'Stable', diagnosis: '' });

            useEffect(() => {
                localStorage.setItem('c_p_data', JSON.stringify(patients));
                if(window.lucide) window.lucide.createIcons();
            }, [patients, activeTab, sidebarOpen]);

            const handleSave = (e) => {
                e.preventDefault();
                const newPatient = { ...formData, id: isEditMode ? formData.id : Date.now() };
                if(isEditMode) setPatients(patients.map(p => p.id === newPatient.id ? newPatient : p));
                else setPatients([newPatient, ...patients]);
                setIsModalOpen(false);
                setFormData({ name: '', phone: '', age: '', status: 'Stable', diagnosis: '' });
            };

            return (
                <div className="min-h-screen flex overflow-hidden" dir="rtl">
                    
                    {/* Sidebar مع خاصية الاختفاء */}
                    <aside className={`bg-[#0d111d] border-l border-white/5 flex flex-col transition-all duration-500 overflow-hidden ${sidebarOpen ? 'w-72 opacity-100' : 'w-0 opacity-0 pointer-events-none'}`}>
                        <div className="p-8 flex-1">
                            <div className="flex items-center gap-3 mb-12">
                                <div className="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white"><Icon name="activity" size={24}/></div>
                                <div><h1 className="font-black text-lg text-white leading-none">Clinica<span className="text-blue-500">PRO</span></h1></div>
                            </div>
                            <nav className="space-y-2">
                                {[{id:'dashboard', icon:'layout-dashboard', l:'لوحة التحكم'}, {id:'records', icon:'users', l:'السجلات الطبية'}, {id:'appointments', icon:'calendar', l:'المواعيد الذكية'}].map(t => (
                                    <button key={t.id} onClick={() => setActiveTab(t.id)} className={`w-full flex items-center gap-4 px-4 py-4 rounded-2xl transition-all ${activeTab === t.id ? 'bg-blue-600 text-white shadow-lg' : 'hover:bg-white/5 text-slate-500'}`}>
                                        <Icon name={t.icon}/> <span className="font-bold text-sm">{t.l}</span>
                                    </button>
                                ))}
                            </nav>
                        </div>
                    </aside>

                    {/* Main Content */}
                    <main className="flex-1 flex flex-col relative h-screen overflow-hidden">
                        
                        {/* زر التحكم في القائمة (يظهر دائماً) */}
                        <button 
                            onClick={() => setSidebarOpen(!sidebarOpen)}
                            className="absolute top-6 right-6 z-50 w-10 h-10 bg-[#0d111d] border border-white/10 rounded-xl flex items-center justify-center text-blue-500 hover:scale-110 transition-all shadow-2xl"
                        >
                            <Icon name={sidebarOpen ? "chevron-right" : "menu"} size={20}/>
                        </button>

                        <header className={`h-20 bg-[#070912]/80 backdrop-blur-md border-b border-white/5 flex items-center justify-between px-8 transition-all ${sidebarOpen ? 'pr-8' : 'pr-20'}`}>
                            <h2 className="text-white font-black text-xl">
                                {activeTab === 'dashboard' && 'الرئيسية'}
                                {activeTab === 'records' && 'قاعدة البيانات الذكية'}
                                {activeTab === 'appointments' && 'المواعيد المقررة'}
                            </h2>
                            <button onClick={() => {setIsEditMode(false); setIsModalOpen(true)}} className="bg-blue-600 hover:bg-blue-500 text-white px-6 py-2.5 rounded-2xl font-black text-sm flex items-center gap-2 shadow-lg shadow-blue-600/20">
                                <Icon name="plus" size={18}/> مريض جديد
                            </button>
                        </header>

                        <div className="flex-1 overflow-y-auto p-8 custom-scroll">
                            <div className="max-w-7xl mx-auto">
                                {activeTab === 'dashboard' && (
                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6 animate-in">
                                        <div className="bg-[#0d111d] p-8 rounded-[2.5rem] border border-white/5">
                                            <p className="text-[10px] font-black text-slate-500 uppercase mb-2">إجمالي المسجلين</p>
                                            <div className="text-5xl font-black text-blue-500">{patients.length}</div>
                                        </div>
                                        <div className="bg-gradient-to-br from-blue-600 to-indigo-700 p-8 rounded-[2.5rem] relative overflow-hidden md:col-span-2">
                                            <div className="relative z-10"><h3 className="text-2xl font-black text-white">AI Predictor</h3><p className="text-blue-100 opacity-80 text-sm mt-2">النظام جاهز لتحليل البيانات.</p></div>
                                            <Icon name="database" size={150} className="absolute -right-10 -bottom-10 opacity-10 text-white"/>
                                        </div>
                                    </div>
                                )}

                                {activeTab === 'records' && (
                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 animate-in">
                                        {patients.map(p => (
                                            <div key={p.id} className="bg-[#0d111d] p-6 rounded-[2.5rem] border border-white/5 relative group transition-all hover:border-blue-500/30">
                                                <div className="flex gap-4 mb-6">
                                                    <div className="w-14 h-14 bg-gradient-to-br from-blue-600 to-indigo-600 rounded-2xl flex items-center justify-center text-white font-black text-2xl">{p.name[0]}</div>
                                                    <div><h4 className="text-white font-bold text-lg">{p.name}</h4><span className="text-[10px] font-black text-slate-500 uppercase">{p.status}</span></div>
                                                </div>
                                                <div className="flex gap-2">
                                                    <button onClick={() => {setFormData(p); setIsEditMode(true); setIsModalOpen(true)}} className="flex-1 bg-white/5 hover:bg-blue-600 py-3 rounded-2xl text-[11px] font-black transition-all border border-white/5">تعديل</button>
                                                    <button onClick={() => setPatients(patients.filter(it => it.id !== p.id))} className="p-3 bg-white/5 rounded-2xl hover:text-red-500 border border-white/5"><Icon name="trash-2" size={16}/></button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}

                                {activeTab === 'appointments' && (
                                    <div className="bg-[#0d111d] rounded-[3rem] border border-white/5 p-10 animate-in">
                                        <h3 className="text-white font-black text-2xl mb-8 flex items-center gap-3"><Icon name="calendar" className="text-blue-500"/> جدول المواعيد</h3>
                                        {patients.length > 0 ? (
                                            <div className="space-y-4">
                                                {patients.map(p => (
                                                    <div key={p.id} className="flex items-center justify-between p-6 bg-white/5 rounded-[2rem] border border-white/5">
                                                        <div className="flex items-center gap-4">
                                                            <div className="w-10 h-10 bg-blue-500/10 rounded-xl flex items-center justify-center text-blue-500"><Icon name="clock" size={18}/></div>
                                                            <div><p className="text-white font-bold text-sm">{p.name}</p><p className="text-[10px] text-slate-500">مراجعة دورية</p></div>
                                                        </div>
                                                        <div className="text-left"><p className="text-white font-black text-xs">اليوم، 04:00 م</p><span className="text-[10px] text-blue-500 font-bold">مؤكد</span></div>
                                                    </div>
                                                ))}
                                            </div>
                                        ) : <p className="text-center text-slate-500 py-20">لا توجد مواعيد نشطة.</p>}
                                    </div>
                                )}
                            </div>
                        </div>
                    </main>

                    {/* Modal */}
                    {isModalOpen && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/90 backdrop-blur-xl p-4 animate-in">
                            <div className="bg-[#0d111d] w-full max-w-xl rounded-[3rem] p-10 border border-white/10 relative shadow-2xl">
                                <button onClick={() => setIsModalOpen(false)} className="absolute top-8 left-8 text-slate-500 hover:text-white"><Icon name="x"/></button>
                                <h3 className="text-2xl font-black text-white mb-8">{isEditMode ? 'تعديل السجل' : 'إضافة مريض جديد'}</h3>
                                <form onSubmit={handleSave} className="space-y-4">
                                    <input placeholder="الاسم" required className="w-full bg-white/5 border border-white/10 rounded-2xl p-4 text-white outline-none focus:border-blue-500" value={formData.name} onChange={e => setFormData({...formData, name:e.target.value})} />
                                    <input placeholder="رقم الهاتف" className="w-full bg-white/5 border border-white/10 rounded-2xl p-4 text-white outline-none focus:border-blue-500" value={formData.phone} onChange={e => setFormData({...formData, phone:e.target.value})} />
                                    <select className="w-full bg-white/5 border border-white/10 rounded-2xl p-4 text-white outline-none" value={formData.status} onChange={e => setFormData({...formData, status:e.target.value})}>
                                        <option value="Stable">مستقر</option>
                                        <option value="Critical">حرج</option>
                                    </select>
                                    <button type="submit" className="w-full bg-blue-600 py-5 rounded-[2rem] text-white font-black text-lg shadow-lg">حفظ البيانات</button>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
