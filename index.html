<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClinicaPRO | نظام الإدارة السريع</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #070912; color: #cbd5e1; overflow: hidden; }
        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-in { animation: fadeIn 0.4s ease-out forwards; }
    </style>
</head>
<body>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        
        // استدعاء أيقونات Lucide بشكل مبسط للمتصفح
        const Icon = ({ name, size = 18, className = "" }) => (
            <span className={`inline-block ${className}`} style={{ width: size, height: size }}>
                <i data-lucide={name}></i>
            </span>
        );

        function App() {
            // تحميل البيانات من ذاكرة المتصفح مباشرة
            const [patients, setPatients] = useState(() => {
                const saved = localStorage.getItem('clinica_data');
                return saved ? JSON.parse(saved) : [];
            });

            const [activeTab, setActiveTab] = useState('dashboard');
            const [search, setSearch] = useState('');
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [formData, setFormData] = useState({ name: '', phone: '', status: 'Stable', diagnosis: '' });

            // حفظ البيانات تلقائياً عند أي تغيير
            useEffect(() => {
                localStorage.setItem('clinica_data', JSON.stringify(patients));
                if (window.lucide) window.lucide.createIcons();
            }, [patients, activeTab, isModalOpen]);

            const handleSave = (e) => {
                e.preventDefault();
                const newPatient = { ...formData, id: Date.now() };
                setPatients([...patients, newPatient]);
                setIsModalOpen(false);
                setFormData({ name: '', phone: '', status: 'Stable', diagnosis: '' });
            };

            const deletePatient = (id) => {
                setPatients(patients.filter(p => p.id !== id));
            };

            return (
                <div className="min-h-screen flex" dir="rtl">
                    {/* Sidebar */}
                    <aside className="w-64 bg-[#0d111d] border-l border-white/5 flex flex-col shrink-0">
                        <div className="p-8 flex-1">
                            <div className="flex items-center gap-3 mb-10">
                                <div className="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white shadow-lg shadow-blue-600/20">
                                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2v20M2 12h20"/></svg>
                                </div>
                                <h1 className="font-black text-xl text-white">Clinica<span className="text-blue-500">PRO</span></h1>
                            </div>
                            <nav className="space-y-2">
                                <button onClick={() => setActiveTab('dashboard')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition ${activeTab === 'dashboard' ? 'bg-blue-600 text-white shadow-lg' : 'hover:bg-white/5'}`}>
                                    الرئيسية
                                </button>
                                <button onClick={() => setActiveTab('records')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition ${activeTab === 'records' ? 'bg-blue-600 text-white shadow-lg' : 'hover:bg-white/5'}`}>
                                    المرضى
                                </button>
                            </nav>
                        </div>
                    </aside>

                    {/* Main Content */}
                    <main className="flex-1 flex flex-col h-screen overflow-hidden">
                        <header className="h-20 border-b border-white/5 px-8 flex items-center justify-between bg-[#070912]">
                            <h2 className="text-white font-bold text-lg">{activeTab === 'dashboard' ? 'لوحة التحكم' : 'سجل المرضى'}</h2>
                            <button onClick={() => setIsModalOpen(true)} className="bg-blue-600 hover:bg-blue-500 text-white px-6 py-2 rounded-xl font-bold text-sm shadow-lg shadow-blue-600/20 transition-transform active:scale-95">
                                + مريض جديد
                            </button>
                        </header>

                        <div className="flex-1 overflow-y-auto p-8 custom-scroll">
                            {activeTab === 'dashboard' && (
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-6 animate-in">
                                    <div className="bg-[#0d111d] p-8 rounded-[2rem] border border-white/5">
                                        <p className="text-xs font-bold text-slate-500 uppercase mb-2">إجمالي المسجلين</p>
                                        <div className="text-5xl font-black text-blue-500">{patients.length}</div>
                                    </div>
                                    <div className="bg-[#0d111d] p-8 rounded-[2rem] border border-white/5">
                                        <p className="text-xs font-bold text-slate-500 uppercase mb-2">حالات مستقرة</p>
                                        <div className="text-5xl font-black text-emerald-500">{patients.filter(p => p.status === 'Stable').length}</div>
                                    </div>
                                </div>
                            )}

                            {activeTab === 'records' && (
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 animate-in">
                                    {patients.map(p => (
                                        <div key={p.id} className="bg-[#0d111d] p-6 rounded-[2rem] border border-white/5 relative group transition-all hover:border-blue-500/30">
                                            <div className="w-12 h-12 bg-blue-600/10 rounded-xl flex items-center justify-center text-blue-500 font-black mb-4">{p.name[0]}</div>
                                            <h4 className="text-white font-bold text-lg">{p.name}</h4>
                                            <p className="text-slate-500 text-xs mb-4">{p.phone}</p>
                                            <div className="flex justify-between items-center pt-4 border-t border-white/5">
                                                <span className="text-[10px] font-bold text-emerald-500 bg-emerald-500/10 px-2 py-1 rounded-lg">{p.status}</span>
                                                <button onClick={() => deletePatient(p.id)} className="text-slate-600 hover:text-red-500 transition-colors">حذف</button>
                                            </div>
                                        </div>
                                    ))}
                                    {patients.length === 0 && <p className="col-span-full text-center text-slate-500 mt-20">لا يوجد مرضى مسجلين حالياً.</p>}
                                </div>
                            )}
                        </div>
                    </main>

                    {/* Modal */}
                    {isModalOpen && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/80 backdrop-blur-sm animate-in">
                            <div className="bg-[#0d111d] w-full max-w-md rounded-[2.5rem] p-10 border border-white/10 relative shadow-2xl">
                                <button onClick={() => setIsModalOpen(false)} className="absolute top-6 left-6 text-slate-500 hover:text-white text-xl font-bold">✕</button>
                                <h3 className="text-2xl font-black text-white mb-8">إضافة مريض</h3>
                                <form onSubmit={handleSave} className="space-y-4">
                                    <input placeholder="الاسم الكامل" required className="w-full bg-white/5 border border-white/10 rounded-xl p-4 text-white outline-none focus:border-blue-500" value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} />
                                    <input placeholder="رقم الهاتف" required className="w-full bg-white/5 border border-white/10 rounded-xl p-4 text-white outline-none focus:border-blue-500" value={formData.phone} onChange={e => setFormData({...formData, phone: e.target.value})} />
                                    <select className="w-full bg-white/5 border border-white/10 rounded-xl p-4 text-white outline-none" value={formData.status} onChange={e => setFormData({...formData, status: e.target.value})}>
                                        <option value="Stable">مستقر</option>
                                        <option value="Critical">حرج</option>
                                    </select>
                                    <button type="submit" className="w-full bg-blue-600 py-4 rounded-2xl text-white font-black shadow-lg shadow-blue-600/20 hover:bg-blue-500 transition-all">حفظ البيانات</button>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
